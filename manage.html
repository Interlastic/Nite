<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Manager</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            if (window.location.search.includes("first_setup=true")) {
                location.href = "manage_first.html" + location.search;
            }
        })();
    </script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <img id="server-icon" class="server-avatar" style="width: 24px; height: 24px; margin: 0; border-radius: 50%;" src="" alt="">
                    <span id="server-name" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Settings</span>
                </div>
            </div>
            <nav class="nav-scroll" id="nav-menu"></nav>
            <div class="sidebar-footer">
                <button class="btn btn-ghost" style="width: 100%;" onclick="location.href='index.html'">← Back</button>
            </div>
        </aside>

        <div class="mobile-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <main class="main-wrap">
            <header class="top-nav">
                <button class="menu-trigger" onclick="toggleSidebar()">☰</button>
                <span id="mobile-title" style="font-weight: 700;">Settings</span>
                <div style="width: 24px;"></div>
            </header>

            <div class="main-content" id="content-viewport">
                <div id="loading-view" class="flex flex-col items-center justify-center" style="height: 100%;">
                    <p style="color:var(--text-muted);">Loading Configuration...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="save-bar" class="save-bar">
        <span style="font-weight: 600; color:white;">Careful! You have unsaved changes!</span>
        <div class="flex gap-4">
            <button class="btn btn-ghost" style="background:transparent; border:none;" onclick="cancelChanges()">Cancel</button>
            <button class="btn btn-success" id="btn-save" onclick="saveChanges()">Save Changes</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="settings.js"></script>
</body>
</html>
