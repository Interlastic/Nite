<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Manager</title>
    <link rel="stylesheet" href="beta.css">
</head>
<body>
    <div id="view-login" class="view-box hide">
        <h1>Welcome</h1>
        <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="openLogin()">Login with Discord</button>
    </div>

    <div id="view-dash" class="container hide">
        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
            <div>
                <h1>Dashboard</h1>
                <p>User: <span id="lbl-user" style="color:var(--accent); font-weight:600;"></span></p>
            </div>
            <button class="btn btn-ghost" onclick="logout()">Log Out</button>
        </div>
        
        <div id="server-list" class="server-grid"></div>
        <p id="status" style="color:var(--text-muted); font-size:0.9rem; margin-top:20px; text-align:center;"></p>
    </div>

    <script src="beta-script.js"></script>
</body>
</html>
