<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <!-- We use absolute paths (starting with /) so they work from any sub-url -->
    <link rel="stylesheet" href="/style.css">
    <style>
        :root {
            --wiki-accent: #00aff4;
            --me-accent: #eb459e;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .error-container {
            max-width: 500px;
            animation: fadeIn 0.5s ease;
        }

        h1 { font-size: 5rem; margin: 0; color: var(--accent); line-height: 1; }
        h2 { font-size: 1.5rem; margin: 10px 0 20px; color: white; }
        p { color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }

        .btn-home {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 12px 30px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: filter 0.2s;
        }
        .btn-home:hover { filter: brightness(1.2); }

        /* WIKINFINITY VARIANT */
        body.theme-wiki { background: #0f1012; }
        body.theme-wiki h1 { color: var(--wiki-accent); font-family: serif; font-style: italic; }
        body.theme-wiki .btn-home { background: var(--wiki-accent); border-radius: 0; border: 1px solid white; }

        /* ME VARIANT */
        body.theme-me { background: #110914; }
        body.theme-me h1 { color: var(--me-accent); text-transform: lowercase; letter-spacing: -2px; }
        body.theme-me .btn-home { background: var(--me-accent); border-radius: 20px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 id="err-code">404</h1>
        <h2 id="err-title">Lost in the void?</h2>
        <p id="err-desc">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-home" id="err-btn">Back to Safety</a>
    </div>

    <script>
        const path = window.location.pathname;
        const body = document.body;
        const title = document.getElementById('err-title');
        const desc = document.getElementById('err-desc');
        const btn = document.getElementById('err-btn');

        if (path.startsWith('/wikinfinity/')) {
            // WIKINFINITY LOOK
            body.classList.add('theme-wiki');
            title.innerText = "Fragment Not Found";
            desc.innerText = "The requested information has not been cataloged in the Infinity Wiki yet.";
            btn.innerText = "Return to Archives";
            btn.href = "/wikinfinity/";
        } 
        else if (path.startsWith('/me/')) {
            // ME/ LOOK
            body.classList.add('theme-me');
            title.innerText = "oops, wrong door";
            desc.innerText = "i haven't built this part of my space yet. come back later?";
            btn.innerText = "go home";
            btn.href = "/me/";
        }
        // DEFAULT ROOT LOOK
        // Uses standard style.css variables and Discord-vibe.
    </script>
</body>
</html>
