<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        :root {
            --wiki-accent: #333;
            --wiki-bg: #f8f9fa;
            --me-accent: #eb459e;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
            margin: 0;
        }

        .error-container {
            max-width: 500px;
            animation: fadeIn 0.5s ease;
            z-index: 10;
        }

        h1 { font-size: 5rem; margin: 0; color: var(--accent); line-height: 1; }
        h2 { font-size: 1.5rem; margin: 10px 0 20px; color: white; }
        p { color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }

        .btn-home {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 12px 30px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: filter 0.2s;
        }
        .btn-home:hover { filter: brightness(1.2); }

        /* WIKINFINITY VARIANT */
        body.theme-wiki { background: var(--wiki-bg); color: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body.theme-wiki h1 { color: #333; font-weight: 300; }
        body.theme-wiki h2 { color: #555; }
        body.theme-wiki p { color: #777; }
        body.theme-wiki .btn-home { background: white; color: #333; border: 1px solid #ddd; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        body.theme-wiki .wiki-top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        body.theme-wiki .wiki-logo { font-weight: 700; color: #333; letter-spacing: -0.5px; }

        /* ME VARIANT */
        body.theme-me { background: #110914; }
        body.theme-me h1 { color: var(--me-accent); text-transform: lowercase; letter-spacing: -2px; }
        body.theme-me .btn-home { background: var(--me-accent); border-radius: 20px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="wiki-header"></div>
    <div class="error-container">
        <h1 id="err-code">404</h1>
        <h2 id="err-title">Lost in the void?</h2>
        <p id="err-desc">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-home" id="err-btn">Back to Safety</a>
    </div>

    <script>
        const path = window.location.pathname;
        const body = document.body;
        const code = document.getElementById('err-code');
        const title = document.getElementById('err-title');
        const desc = document.getElementById('err-desc');
        const btn = document.getElementById('err-btn');
        const header = document.getElementById('wiki-header');

        if (path.startsWith('/wikinfinity/')) {
            body.classList.add('theme-wiki');
            header.innerHTML = '<div class="wiki-top-bar"><span class="wiki-logo">WikiInfinity</span></div>';
            code.innerText = "404";
            title.innerText = "Not Found";
            desc.innerText = "How did you get here? Did you doomscroll too much?";
            btn.innerText = "Go Back";
            btn.href = "/wikinfinity/";
        } 
        else if (path.startsWith('/me/')) {
            body.classList.add('theme-me');
            title.innerText = "oops, wrong door";
            desc.innerText = "i haven't built this part of my space yet. come back later?";
            btn.innerText = "go home";
            btn.href = "/me/";
        }
    </script>
</body>
</html>
